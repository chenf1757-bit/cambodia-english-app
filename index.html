<meta charset="UTF-8">

<title>小学英语词库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
#app{display:flex;flex-direction:column;align-items:center;padding:20px 16px 28px;gap:14px;width:100%;max-width:440px}
.grade-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.grade-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid #d1d1d6;background:#fff;color:#6e6e73;cursor:pointer;transition:all .15s}
.grade-btn:hover{background:#f0f0f5;color:#1d1d1f}
.grade-btn.active{background:#0071e3;color:#fff;border-color:transparent}
.card{width:100%;background:#fff;border:1px solid #e5e5ea;border-radius:24px;padding:24px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:310px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.word-en{font-size:40px;font-weight:700;color:#1d1d1f;letter-spacing:-.02em;text-align:center;line-height:1.1}
.word-khmer{font-family:'Khmer OS','Kantumruy Pro','Kantumruy','Khmer MN','Khmer Sangam MN','Noto Sans Khmer',sans-serif;font-size:20px;color:#1a3a6b;text-align:center;line-height:1.6;letter-spacing:.02em}
.word-zh{font-size:14px;color:#8e8e93;font-style:italic;text-align:center}
.stage{width:160px;height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.anim-bounce .shape{animation:aBounce .6s cubic-bezier(.36,.07,.19,.97) infinite alternate}
@keyframes aBounce{0%{transform:translateY(0) scaleY(1)}85%{transform:translateY(0) scaleY(1)}100%{transform:translateY(-28px) scaleY(.9)}}
.anim-rise .shape{animation:aRise 2s ease-in-out infinite alternate}
@keyframes aRise{0%{transform:translateY(12px) scale(.95);opacity:.7}100%{transform:translateY(-12px) scale(1.05);opacity:1}}
.anim-sway .shape{animation:aSway .9s ease-in-out infinite alternate;transform-origin:center bottom}
@keyframes aSway{0%{transform:rotate(-18deg)}100%{transform:rotate(18deg)}}
.anim-pulse .shape{animation:aPulse 1.2s ease-in-out infinite alternate}
@keyframes aPulse{0%{transform:scale(.85);opacity:.6}100%{transform:scale(1.15);opacity:1}}
.anim-spin .shape{animation:aSpin 2.5s linear infinite}
@keyframes aSpin{to{transform:rotate(360deg)}}
.anim-wave .shape{animation:aWave 1.4s ease-in-out infinite}
@keyframes aWave{0%,100%{transform:translateX(-14px) translateY(0)}50%{transform:translateX(14px) translateY(-10px)}}
.anim-flip .shape{animation:aFlip 2s ease-in-out infinite}
@keyframes aFlip{0%,100%{transform:rotateY(0)}50%{transform:rotateY(180deg)}}
.anim-shake .shape{animation:aShake .5s ease-in-out infinite alternate}
@keyframes aShake{0%{transform:translateX(-8px) rotate(-4deg)}100%{transform:translateX(8px) rotate(4deg)}}
.shadow-dot{width:44px;height:10px;border-radius:50%;background:rgba(0,0,0,.12);position:absolute;bottom:4px;left:50%;transform:translateX(-50%);animation:aShadow .6s ease-in-out infinite alternate}
@keyframes aShadow{0%{transform:translateX(-50%) scaleX(1);opacity:.15}100%{transform:translateX(-50%) scaleX(.5);opacity:.04}}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.controls2{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:700;user-select:none;border-radius:22px;padding:0 18px;height:58px;transition:transform .12s cubic-bezier(.34,1.56,.64,1),filter .1s,box-shadow .12s;position:relative}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:scale(.88) translateY(3px)!important;filter:brightness(.95)}
.btn-nav{width:72px;font-size:24px;background:linear-gradient(160deg,#ffe066 0%,#ffb800 100%);color:#7a4f00;box-shadow:0 6px 0 #c88a00,0 8px 16px rgba(200,138,0,.3)}
.btn-nav:hover{transform:translateY(-2px)}
.btn-nav:active{box-shadow:0 2px 0 #c88a00!important}
.btn-play{min-width:130px;font-size:16px;background:linear-gradient(160deg,#5ec8ff 0%,#0071e3 100%);color:#fff;box-shadow:0 6px 0 #004fa3,0 8px 16px rgba(0,113,227,.35)}
.btn-play:hover{transform:translateY(-2px)}
.btn-play:active{box-shadow:0 2px 0 #004fa3!important}
.btn-auto{min-width:148px;font-size:16px;background:linear-gradient(160deg,#ff9de2 0%,#c850c0 100%);color:#fff;box-shadow:0 6px 0 #8f0f8a,0 8px 16px rgba(200,80,192,.35)}
.btn-auto:hover{transform:translateY(-2px)}
.btn-auto:active{box-shadow:0 2px 0 #8f0f8a!important}
.btn-auto.on{background:linear-gradient(160deg,#ffd166 0%,#ef8c1a 100%);box-shadow:0 6px 0 #a85900,0 8px 16px rgba(239,140,26,.35);animation:autoPulse 1s ease-in-out infinite alternate}
@keyframes autoPulse{0%{filter:brightness(1)}100%{filter:brightness(1.12)}}
.btn-know{min-width:148px;font-size:16px;background:linear-gradient(160deg,#6effa0 0%,#00b945 100%);color:#fff;box-shadow:0 6px 0 #007a2e,0 8px 16px rgba(0,185,69,.35)}
.btn-know:hover{transform:translateY(-2px)}
.btn-know:active{box-shadow:0 2px 0 #007a2e!important}
.meta{display:flex;gap:16px;align-items:center}
.counter{font-size:14px;color:#8e8e93;font-weight:500}
.grade-label{font-size:14px;font-weight:700;color:#0071e3}
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
</style>
</head>

{word:"Organization",meaning:"组织",khmer:"អង្គការ",animationType:"spin"},
{word:"Phenomenon",meaning:"现象",khmer:"បាតុភូត",animationType:"pulse"},

const shapeHTML={
  bounce:`<div class="shadow-dot"></div><div class="shape" style="width:60px;height:60px;background:#FFD600;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;">⭐</div>`,
  rise:`<div class="shape" style="width:56px;height:56px;background:#81D4FA;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;">☁️</div>`,
  sway:`<div class="shape" style="width:24px;height:80px;background:#81C784;border-radius:12px;display:flex;align-items:center;justify-content:center;padding-top:4px;font-size:22px;">🌿</div>`,
  pulse:`<div class="shape" style="width:64px;height:64px;background:#FF8A65;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;">☀️</div>`,
  spin:`<div class="shape" style="width:60px;height:60px;background:#CE93D8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;">🌀</div>`,
  wave:`<div class="shape" style="width:60px;height:40px;background:#4FC3F7;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:28px;">🌊</div>`,
  flip:`<div class="shape" style="width:54px;height:70px;background:#A5D6A7;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;">📖</div>`,
  shake:`<div class="shape" style="width:54px;height:54px;background:#FFAB40;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;">⚡</div>`
};

const gradeNames={grade1:"一年级",grade2:"二年级",grade3:"三年级",grade4:"四年级",grade5:"五年级",grade6:"六年级"};
const STORAGE_KEY="ev_progress_v1";

function loadProgress(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{}}catch(e){return{}}}
function saveProgress(grade,idx){const p=loadProgress();p[grade]=idx;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(p))}catch(e){}}
function getProgress(grade){const p=loadProgress();const idx=parseInt(p[grade])||0;const len=englishVocabulary[grade].length;return(idx>=0&&idx<len)?idx:0}

let currentGrade="grade1";
let currentIdx=getProgress("grade1");

const wordEn=document.getElementById("wordEn");
const wordKhmer=document.getElementById("wordKhmer");
const wordZh=document.getElementById("wordZh");
const stage=document.getElementById("stage");
const counter=document.getElementById("counter");
const gradeLabel=document.getElementById("gradeLabel");
const gradeTabs=document.getElementById("gradeTabs");

Object.keys(gradeNames).forEach(key=>{
  const btn=document.createElement("button");
  btn.className="grade-btn"+(key===currentGrade?" active":"");
  btn.textContent=gradeNames[key];
  btn.onclick=()=>selectGrade(key);
  gradeTabs.appendChild(btn);
});

function selectGrade(key){
  saveProgress(currentGrade,currentIdx);
  currentGrade=key;
  currentIdx=getProgress(key);
  gradeTabs.querySelectorAll(".grade-btn").forEach((b,i)=>{
    b.classList.toggle("active",Object.keys(gradeNames)[i]===key);
  });
  renderCard();
}

function renderCard(){
  const list=englishVocabulary[currentGrade];
  const item=list[currentIdx];
  const anim=item.animationType||"bounce";
  wordEn.textContent=item.word;
  wordKhmer.textContent=item.khmer||"";
  wordZh.textContent=item.meaning;
  stage.className="stage anim-"+anim;
  stage.innerHTML=shapeHTML[anim]||shapeHTML.bounce;
  counter.textContent=(currentIdx+1)+" / "+list.length;
  gradeLabel.textContent=gradeNames[currentGrade];
  saveProgress(currentGrade,currentIdx);
}

// ── 100% offline Web Speech API ──
function speak(word){
  if(!("speechSynthesis" in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang="en-US";
  u.rate=0.82;
  u.pitch=1;
  // prefer a US English voice if available, works fully offline
  const voices=speechSynthesis.getVoices();
  const usVoice=voices.find(v=>v.lang==="en-US"&&v.localService)||voices.find(v=>v.lang==="en-US")||null;
  if(usVoice)u.voice=usVoice;
  speechSynthesis.speak(u);
}
// voices may load async on some browsers
if(speechSynthesis.onvoiceschanged!==undefined){speechSynthesis.onvoiceschanged=()=>{}}

// ── Auto-play ──
let autoTimer=null;
const btnAuto=document.getElementById("btnAuto");
function stopAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  btnAuto.classList.remove("on");
  btnAuto.innerHTML="&#x23F0; &#x81EA;&#x52A8;&#x8FDE;&#x64AD;";
}
function startAuto(){
  btnAuto.classList.add("on");
  btnAuto.innerHTML="&#x23F9; &#x505C;&#x6B62;&#x8FDE;&#x64AD;";
  speak(englishVocabulary[currentGrade][currentIdx].word);
  autoTimer=setInterval(()=>{
    const len=englishVocabulary[currentGrade].length;
    currentIdx=(currentIdx+1)%len;
    renderCard();
    speak(englishVocabulary[currentGrade][currentIdx].word);
  },4000);
}
btnAuto.onclick=()=>{if(autoTimer)stopAuto();else startAuto()};

function navTo(dir){
  stopAuto();
  const len=englishVocabulary[currentGrade].length;
  currentIdx=(currentIdx+dir+len)%len;
  renderCard();
}
document.getElementById("btnPrev").onclick=()=>navTo(-1);
document.getElementById("btnNext").onclick=()=>navTo(1);
document.getElementById("btnPlay").onclick=()=>speak(englishVocabulary[currentGrade][currentIdx].word);

// ── Confetti ──
const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");
let particles=[];
const COLORS=["#ff595e","#ffca3a","#6a4c93","#1982c4","#8ac926","#ff6d00","#f72585","#4cc9f0"];
function spawnConfetti(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  particles=[];
  for(let i=0;i<200;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=4+Math.random()*9;
    particles.push({x:canvas.width/2,y:canvas.height*0.45,vx:Math.cos(ang)*spd*(0.5+Math.random()),vy:Math.sin(ang)*spd-7-Math.random()*6,w:7+Math.random()*8,h:4+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],rot:Math.random()*360,rotV:(Math.random()-.5)*12,life:1});
  }
  animConfetti();
}
function animConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let alive=false;
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.35;p.rot+=p.rotV;p.life-=0.011;
    if(p.life<=0)continue;alive=true;
    ctx.save();ctx.globalAlpha=p.life;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
  }
  if(alive)requestAnimationFrame(animConfetti);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}
document.getElementById("btnKnow").onclick=()=>{
  spawnConfetti();
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1046].forEach((f,i)=>{
      const o=ac.createOscillator();const g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.frequency.value=f;o.type="sine";
      g.gain.setValueAtTime(0,ac.currentTime+i*.1);g.gain.linearRampToValueAtTime(.25,ac.currentTime+i*.1+.02);g.gain.linearRampToValueAtTime(0,ac.currentTime+i*.1+.18);
      o.start(ac.currentTime+i*.1);o.stop(ac.currentTime+i*.1+.2);
    });
  }catch(e){}
};

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")navTo(1);
  if(e.key==="ArrowLeft")navTo(-1);
  if(e.key===" "){e.preventDefault();speak(englishVocabulary[currentGrade][currentIdx].word);}
});

renderCard();
</script>
